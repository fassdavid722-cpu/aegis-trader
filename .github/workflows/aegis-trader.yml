name: Aegis Autonomous Trader

on:
  schedule:
    # Runs every 5 minutes — GitHub throttles this to ~1x per few min under load,
    # but concurrency lock below guarantees no overlap regardless.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write

concurrency:
  group: aegis-trader-single-instance
  cancel-in-progress: false   # queue, don't kill a mid-trade run — just skip if one's already going

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore journal DB
        uses: actions/cache@v4
        with:
          path: data
          key: aegis-journal-v2-${{ github.run_id }}
          restore-keys: |
            aegis-journal-v2-

      - name: Install dependencies
        run: |
          pip install httpx python-dotenv groq pydantic

      - name: Run one trading cycle
        env:
          BITGET_API_KEY: ${{ secrets.BITGET_API_KEY }}
          BITGET_SECRET_KEY: ${{ secrets.BITGET_SECRET_KEY }}
          BITGET_PASSPHRASE: ${{ secrets.BITGET_PASSPHRASE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== Cycle — $(date -u +%H:%M:%S) UTC ==="
          python3 autonomous_trader.py 2>&1 || echo "[cycle] failed, will retry next scheduled run"

      - name: Commit journal DB (trade memory persistence)
        if: always()
        run: |
          git config user.name "Aegis Trader Bot"
          git config user.email "actions@github.com"
          git add data/journal.db 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: persist journal DB [skip ci]"
            git pull --rebase origin main 2>&1 || true
            git push 2>&1 || echo "push failed (will retry next cycle)"
          else
            echo "No DB changes to commit"
          fi
