name: Aegis Autonomous Trader

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore journal DB
        uses: actions/cache@v4
        with:
          path: data
          key: aegis-journal-${{ github.run_id }}
          restore-keys: |
            aegis-journal-

      - name: Install dependencies
        run: |
          pip install httpx python-dotenv groq pydantic

      - name: Run single trading cycle
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 autonomous_trader.py 2>&1

      - name: Commit journal DB
        if: always()
        run: |
          git config user.name "Aegis Trader Bot"
          git config user.email "actions@github.com"
          git add data/journal.db 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: persist journal DB [skip ci]"
            git push
          fi

      - name: Re-trigger self
        if: always()
        run: |
          sleep 5
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/aegis-trader.yml/dispatches" \
            -d '{"ref":"main"}'
