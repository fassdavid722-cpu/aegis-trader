name: Aegis Autonomous Trader

on:
  schedule:
    # Safety-net only — the self-perpetuating loop is the primary driver.
    # This re-kicks the chain if it ever dies (every 6 hours).
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore journal DB
        uses: actions/cache@v4
        with:
          path: data
          key: aegis-journal-${{ github.run_id }}
          restore-keys: |
            aegis-journal-

      - name: Install dependencies
        run: |
          pip install httpx python-dotenv groq pydantic

      - name: Run continuous trading loop (~5.5 hours, 5-min cycles)
        env:
          BITGET_API_KEY: ${{ secrets.BITGET_API_KEY }}
          BITGET_SECRET_KEY: ${{ secrets.BITGET_SECRET_KEY }}
          BITGET_PASSPHRASE: ${{ secrets.BITGET_PASSPHRASE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          END_TIME=$(( $(date +%s) + 335*60 ))
          CYCLE=1
          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            echo "=== Cycle $CYCLE — $(date -u +%H:%M:%S) UTC ==="
            python3 autonomous_trader.py 2>&1 || echo "[loop] cycle failed, continuing"
            CYCLE=$((CYCLE + 1))
            sleep 300
          done

      - name: Commit journal DB back to repo (trade memory persistence)
        if: always()
        run: |
          git config user.name "Aegis Trader Bot"
          git config user.email "actions@github.com"
          git add data/journal.db 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No DB changes to commit"
          else
            git commit -m "chore: persist journal DB — $(date -u +%Y-%m-%dT%H:%M) UTC [skip ci]"
            git push
            echo "✅ Journal DB committed — next run will have full trade history"
          fi

      - name: Re-trigger self to keep the chain alive
        if: always()
        run: |
          sleep 5
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/aegis-trader.yml/dispatches" \
            -d '{"ref":"main"}'
